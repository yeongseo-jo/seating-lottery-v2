<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>🌸 자리 뽑기</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:linear-gradient(160deg,#0D0D18 0%,#0A0A0F 50%,#080810 100%);font-family:-apple-system,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;color:#fff}
.orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0}
.orb-purple{width:400px;height:400px;top:-100px;left:-100px;background:radial-gradient(circle,rgba(94,92,230,.12) 0%,transparent 70%)}
.orb-mint{width:300px;height:300px;bottom:0;right:-50px;background:radial-gradient(circle,rgba(45,212,191,.07) 0%,transparent 70%)}

/* 첫 화면 */
#screen-entry{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;background:linear-gradient(160deg,#0D0D18 0%,#0A0A0F 50%,#080810 100%)}
.entry-emoji{font-size:40px;margin-bottom:12px;text-align:center}
.entry-sub{font-size:14px;font-weight:600;color:rgba(255,255,255,.42);letter-spacing:3px;text-transform:uppercase;margin-bottom:14px;text-align:center}
.entry-title{font-size:36px;font-weight:800;text-align:center;margin-bottom:40px;letter-spacing:-.5px}
.entry-card{width:100%;max-width:340px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);border-radius:20px;padding:26px;backdrop-filter:blur(20px);margin-bottom:12px}
.entry-card-title{font-size:15px;font-weight:700;margin-bottom:14px}
.entry-pw-hint{font-size:13px;color:rgba(255,255,255,.35);text-align:center;margin-bottom:14px}
.entry-pw-input{width:100%;padding:13px 14px;border-radius:12px;border:1px solid rgba(245,166,35,.3);background:rgba(255,255,255,.05);color:#fff;font-size:22px;text-align:center;letter-spacing:8px;outline:none;font-family:inherit;margin-bottom:8px}
.entry-pw-input.error{border-color:rgba(255,80,80,.6)}
.entry-error{font-size:13px;color:rgba(255,100,100,.9);text-align:center;margin-bottom:8px;display:none}
.btn-entry-pw{width:100%;padding:15px;border-radius:12px;border:1px solid rgba(245,166,35,.45);background:linear-gradient(135deg,rgba(245,166,35,.22),rgba(245,130,10,.12));color:#FFD580;font-weight:700;font-size:15px;cursor:pointer;font-family:inherit}
.btn-entry-browse{width:100%;max-width:340px;padding:16px;border-radius:16px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);backdrop-filter:blur(20px);color:rgba(255,255,255,.6);font-weight:600;font-size:15px;cursor:pointer;font-family:inherit}
.role-badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.role-viewer{background:rgba(245,166,35,.2);color:#FFD580;border:1px solid rgba(245,166,35,.4)}
.role-host{background:rgba(94,92,230,.25);color:#A8A6FF;border:1px solid rgba(94,92,230,.5)}
.role-browse{background:rgba(255,255,255,.08);color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.12)}

/* 메인 앱 */
#screen-app{display:none;padding-bottom:48px}
#role-bar{width:100%;padding:6px 16px;display:flex;align-items:center;justify-content:center;gap:8px;font-size:11px;font-weight:600;backdrop-filter:blur(20px)}
#role-bar.bar-browse{background:rgba(255,255,255,.04);border-bottom:1px solid rgba(255,255,255,.07);color:rgba(255,255,255,.4)}
#role-bar.bar-viewer{background:rgba(245,166,35,.08);border-bottom:1px solid rgba(245,166,35,.2);color:#FFD580}
#role-bar.bar-host{background:rgba(94,92,230,.1);border-bottom:1px solid rgba(94,92,230,.3);color:#A8A6FF}
header{width:100%;background:rgba(255,255,255,.03);backdrop-filter:blur(30px);border-bottom:1px solid rgba(255,255,255,.07);padding:18px 20px 14px}
.header-sub{font-size:11px;font-weight:600;color:rgba(255,255,255,.38);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.header-title{font-size:20px;font-weight:700;letter-spacing:-.5px}
.controls{position:relative;z-index:1;width:100%;max-width:600px;margin:0 auto;padding:20px 16px 0}

/* 황금 버튼 */
#btn-lock{width:100%;margin-bottom:10px;padding:13px 16px;border-radius:16px;border:1px solid rgba(245,166,35,.45);background:linear-gradient(135deg,rgba(245,166,35,.16),rgba(245,130,10,.08));backdrop-filter:blur(24px);box-shadow:0 0 0 1px rgba(245,166,35,.08),0 2px 16px rgba(245,166,35,.12);cursor:pointer;display:flex;align-items:center;gap:10px;overflow:hidden;font-family:inherit}
#lock-icon{font-size:16px;flex-shrink:0}
#lock-text{flex:1;overflow:hidden;min-width:0}
.marquee-wrap{overflow:hidden;white-space:nowrap}
@keyframes marquee{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.marquee-inner{display:inline-block;animation:marquee 18s linear infinite;font-size:11px;color:rgba(255,213,128,.75);font-weight:500}
.lock-confirmed{display:block;font-size:16px;font-weight:800;color:#FFD580;text-align:center}
#lock-badge{flex-shrink:0;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;background:rgba(245,166,35,.15);color:#F5A623;border:1px solid rgba(245,166,35,.35)}

/* 보라/민트 버튼 */
.btn-row{display:flex;gap:10px;margin-bottom:16px}
.glass-btn{flex:1;padding:16px 12px;border-radius:18px;font-family:inherit;font-size:14px;font-weight:700;color:#fff;cursor:pointer;line-height:1.4;text-align:center;transition:all .2s ease}
.glass-btn:disabled{cursor:not-allowed;opacity:.35}
#btn-leaders{border:1px solid rgba(94,92,230,.5);background:linear-gradient(145deg,rgba(94,92,230,.22),rgba(94,92,230,.10));backdrop-filter:blur(20px);box-shadow:0 4px 24px rgba(94,92,230,.25),inset 0 1px 0 rgba(255,255,255,.08)}
#btn-members{border:1px solid rgba(45,212,191,.4);background:linear-gradient(145deg,rgba(45,212,191,.18),rgba(45,212,191,.08));backdrop-filter:blur(20px);box-shadow:0 4px 24px rgba(45,212,191,.2),inset 0 1px 0 rgba(255,255,255,.08)}
.btn-icon{font-size:18px;display:block;margin-bottom:2px}
.btn-sub{display:block;font-size:11px;opacity:.78;margin-top:4px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#fff}
.btn-count{display:block;font-size:11px;opacity:.6;margin-top:2px;font-weight:500}

/* 명단 패널 */
.roster-wrap{margin-bottom:14px}
#roster-toggle{width:100%;display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-radius:16px;border:1px solid rgba(245,166,35,.38);background:linear-gradient(135deg,rgba(245,166,35,.16),rgba(245,130,10,.08));backdrop-filter:blur(24px);box-shadow:0 0 0 1px rgba(245,166,35,.08),0 2px 16px rgba(245,166,35,.10);cursor:pointer;font-family:inherit;transition:all .22s ease}
#roster-toggle.open{border-color:rgba(245,166,35,.55);border-radius:16px 16px 0 0;background:linear-gradient(135deg,rgba(245,166,35,.22),rgba(245,130,10,.12))}
.roster-left{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.roster-title{font-size:14px;color:#FFD580;font-weight:700}
.roster-badge{padding:1px 7px;border-radius:20px;font-size:10px;font-weight:700}
.badge-purple{background:rgba(94,92,230,.25);color:#A8A6FF;border:1px solid rgba(94,92,230,.4)}
.badge-mint{background:rgba(45,212,191,.18);color:#7FEEE5;border:1px solid rgba(45,212,191,.35)}
#roster-chevron{width:28px;height:28px;border-radius:8px;background:rgba(245,166,35,.15);border:1px solid rgba(245,166,35,.3);display:flex;align-items:center;justify-content:center;color:#F5A623;font-size:22px;flex-shrink:0;transition:transform .22s ease;line-height:1}
#roster-body{display:none;padding:12px 14px 14px;border-radius:0 0 16px 16px;border:1px solid rgba(245,166,35,.55);border-top:none;background:rgba(255,255,255,.025);backdrop-filter:blur(20px)}
.roster-section-label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:7px;opacity:.8}
.roster-chips{display:flex;flex-wrap:wrap;gap:5px}
.roster-divider{height:1px;background:rgba(255,255,255,.06);margin:10px 0}
.name-chip{padding:4px 10px;border-radius:20px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:5px;transition:all .3s}
.leader-chip{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.3)}
.leader-chip.taken{background:linear-gradient(135deg,rgba(94,92,230,.35),rgba(94,92,230,.2));border-color:rgba(94,92,230,.5);color:#C8C6FF}
.member-chip{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.25)}
.member-chip.taken{background:linear-gradient(135deg,rgba(45,212,191,.25),rgba(45,212,191,.12));border-color:rgba(45,212,191,.4);color:#9FECE4}
.seat-label{font-size:9px;opacity:.6;font-weight:500}

/* 지도 */
.map-wrap{position:relative;z-index:1;width:100%;max-width:600px;margin:0 auto;padding:0 16px}
.map-inner{border-radius:24px;overflow:hidden;border:1px solid rgba(94,92,230,.25);box-shadow:0 0 0 1px rgba(94,92,230,.1),0 24px 60px rgba(0,0,0,.7),0 0 80px rgba(94,92,230,.08);background:#0C0C1A}
#map-svg{display:block;width:100%}

/* 의자 - 기본(빈 자리) */
.chair-back{fill:rgba(255,255,255,.07);stroke:rgba(255,255,255,.14);stroke-width:1}
.chair-seat{fill:rgba(255,255,255,.07);stroke:rgba(255,255,255,.14);stroke-width:1.5}
/* 의자 - 테이블장 */
.chair-back.leader{fill:#5E5CE6;stroke:#8C8AF5;filter:url(#glowPurple)}
.chair-seat.leader{fill:#5E5CE6;stroke:#8C8AF5;stroke-width:1.5;filter:url(#glowPurple)}
/* 의자 - 일반 */
.chair-back.member{fill:#2DD4BF;stroke:#5EEAD4;filter:url(#glowMint)}
.chair-seat.member{fill:#2DD4BF;stroke:#5EEAD4;stroke-width:1.5;filter:url(#glowMint)}
.chair-name{font-size:8px;font-weight:800;fill:#fff;pointer-events:none;user-select:none;font-family:-apple-system,sans-serif}
.chair-name.member-name{fill:#00201C}

/* 초기화 */
.reset-wrap{position:relative;z-index:1;width:100%;max-width:600px;margin:0 auto;padding:20px 16px 0;display:flex;justify-content:center}
#btn-reset{padding:12px 40px;border-radius:14px;border:1px solid rgba(245,166,35,.45);background:linear-gradient(135deg,rgba(245,166,35,.18),rgba(245,130,10,.10));backdrop-filter:blur(16px);color:#FFD580;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:.3px;box-shadow:0 2px 16px rgba(245,166,35,.15)}
#btn-reset:disabled{opacity:.3;cursor:not-allowed}

/* 날아가는 칩 */
.floating-chip{position:fixed;z-index:9999;pointer-events:none;padding:4px 11px;border-radius:20px;font-size:12px;font-weight:800;font-family:-apple-system,sans-serif;white-space:nowrap;will-change:left,top,opacity,transform}
.chip-leader{background:linear-gradient(135deg,#5E5CE6,#8C8AF5);color:#fff;box-shadow:0 0 16px rgba(94,92,230,.7)}
.chip-member{background:linear-gradient(135deg,#2DD4BF,#5EEAD4);color:#00201C;box-shadow:0 0 16px rgba(45,212,191,.7)}

/* 모달 */
#modal-overlay{display:none;position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,.75);backdrop-filter:blur(12px);align-items:center;justify-content:center;padding:24px}
.modal-box{background:linear-gradient(145deg,rgba(20,18,50,.98),rgba(10,10,20,.98));border:1px solid rgba(245,166,35,.5);border-radius:24px;padding:28px 24px;width:100%;max-width:320px;box-shadow:0 0 60px rgba(245,166,35,.2)}
.modal-emoji{font-size:28px;text-align:center;margin-bottom:8px}
.modal-title{font-size:16px;font-weight:700;color:#FFD580;text-align:center;margin-bottom:4px}
.modal-sub{font-size:12px;color:rgba(255,255,255,.4);text-align:center;margin-bottom:20px}
.modal-pw-input{width:100%;padding:12px 16px;border-radius:12px;border:1px solid rgba(245,166,35,.35);background:rgba(255,255,255,.05);color:#fff;font-size:18px;text-align:center;letter-spacing:6px;outline:none;font-family:inherit}
.modal-pw-input.error{border-color:rgba(255,80,80,.6)}
.modal-error{display:none;color:rgba(255,100,100,.9);font-size:12px;text-align:center;margin-top:8px}
.modal-confirm{width:100%;margin-top:16px;padding:13px;border-radius:12px;border:1px solid rgba(245,166,35,.5);background:linear-gradient(135deg,rgba(245,166,35,.3),rgba(245,120,10,.2));color:#FFD580;font-weight:700;font-size:15px;cursor:pointer;font-family:inherit}
</style>
</head>
<body>
<div class="orb orb-purple"></div>
<div class="orb orb-mint"></div>

<!-- 첫 화면 -->
<div id="screen-entry">
  <div class="entry-sub">by YDD</div>
  <div class="entry-title">랜덤으로 자리 뽑기</div>
  <div class="entry-card">
    <div class="entry-card-title">입장코드로 입장</div>
    <div class="entry-pw-hint">입장코드를 입력하세요</div>
    <input id="entry-pw" class="entry-pw-input" type="password" placeholder="••••••" maxlength="6"/>
    <div id="entry-error" class="entry-error">틀렸어요</div>
    <button class="btn-entry-pw" onclick="submitEntryPw()">입장하기</button>
  </div>
  <button class="btn-entry-browse" onclick="enterApp('browse')">앱 둘러보기 (실시간 공유 없음)</button>
</div>

<!-- 메인 앱 -->
<div id="screen-app">
  <div id="role-bar"></div>
  <header>
    <div class="header-sub">양고기 먹으러 가기 전에</div>
    <div class="header-title" id="header-title">🌸🤤🍀 자리를 뽑아볼게요 🥵✨🥑</div>
  </header>

  <!-- 뽑기 비번 모달 -->
  <div id="modal-overlay">
    <div class="modal-box">
      <div class="modal-emoji">🔐</div>
      <div class="modal-title">입장코드 확인</div>
      <div class="modal-sub">진행자 입장코드를 입력하세요</div>
      <input id="modal-pw" class="modal-pw-input" type="password" placeholder="입장코드"/>
      <div id="modal-error" class="modal-error">틀렸어요 😅</div>
      <button class="modal-confirm" onclick="submitModalPw()">확인</button>
    </div>
  </div>

  <div class="controls">
    <!-- 황금 안내 박스 (viewer/host만 표시, host가 Firebase로 텍스트 제어) -->
    <div id="announce-box" style="display:none;width:100%;margin-bottom:10px;padding:16px;border-radius:16px;border:1px solid rgba(245,166,35,0.45);background:linear-gradient(135deg,rgba(245,166,35,0.16),rgba(245,130,10,0.08));backdrop-filter:blur(24px);box-shadow:0 0 0 1px rgba(245,166,35,0.08),0 2px 16px rgba(245,166,35,0.12);text-align:center;">
      <span id="announce-text" style="font-size:18px;font-weight:800;color:#FFD580;letter-spacing:-0.3px;"></span>
    </div>
    <!-- 황금 잠금 버튼 (browse 전용 — 항상 숨김, 코드 호환용으로만 유지) -->
    <button id="btn-lock" onclick="onLockClick()" style="display:none;"></button>
    <!-- 보라/민트 버튼 -->
    <div class="btn-row">
      <button id="btn-leaders" class="glass-btn" onclick="onDrawClick(true)">
        <span class="btn-icon">👑</span>1) 테이블장 앉히기
        <span class="btn-sub">여러분들과 친해지고 싶어요 .. ❣️</span>
        <span class="btn-count" id="leader-count">0/8명 완료</span>
      </button>
      <button id="btn-members" class="glass-btn" onclick="onDrawClick(false)">
        <span class="btn-icon">🎲</span>2) 사람들 앉히기
        <span class="btn-sub">도파민을 위한 랜덤 ㄱㄱ</span>
        <span class="btn-count" id="member-count">0/23명 완료</span>
      </button>
    </div>
    <!-- 명단 패널 -->
    <div class="roster-wrap">
      <button id="roster-toggle" onclick="toggleRoster()">
        <div class="roster-left">
          <span class="roster-title">참석자 명단</span>
          <span class="roster-badge badge-purple" id="badge-leaders">👑 0/8</span>
          <span class="roster-badge badge-mint" id="badge-members">★ 0/23</span>
        </div>
        <div id="roster-chevron">▾</div>
      </button>
      <div id="roster-body">
        <div class="roster-section-label" style="color:#5E5CE6">👑 테이블장</div>
        <div class="roster-chips" id="roster-leaders"></div>
        <div class="roster-divider"></div>
        <div class="roster-section-label" style="color:#2DD4BF">★ 일반 참석자</div>
        <div class="roster-chips" id="roster-members"></div>
      </div>
    </div>
  </div>

  <!-- 지도 — SVG 정적으로 완전히 그림 -->
  <div class="map-wrap">
    <div class="map-inner">
      <svg id="map-svg" viewBox="0 0 600 820" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M40 0 L0 0 0 40" fill="none" stroke="rgba(94,92,230,0.07)" stroke-width="0.8"/>
          </pattern>
          <filter id="glowPurple" x="-40%" y="-40%" width="180%" height="180%">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="glowMint" x="-40%" y="-40%" width="180%" height="180%">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="glowPurpleSoft" x="-80%" y="-80%" width="260%" height="260%">
            <feGaussianBlur stdDeviation="8" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <rect width="600" height="820" fill="#0C0C1A"/>
        <rect width="600" height="820" fill="url(#grid)"/>
        <rect x="8" y="8" width="584" height="804" rx="16" fill="none" stroke="rgba(94,92,230,0.20)" stroke-width="1.5"/>
        <line x1="300" y1="20" x2="300" y2="800" stroke="rgba(94,92,230,0.12)" stroke-width="1" stroke-dasharray="6,10"/>
        <text x="150" y="34" text-anchor="middle" font-size="10" font-weight="600" fill="rgba(94,92,230,0.45)" letter-spacing="2" font-family="-apple-system,sans-serif">LEFT</text>
        <text x="450" y="34" text-anchor="middle" font-size="10" font-weight="600" fill="rgba(94,92,230,0.45)" letter-spacing="2" font-family="-apple-system,sans-serif">RIGHT</text>

        <!-- F, G 테이블과 의자를 모두 감싸는 단차 표시 -->
        <rect x="375" y="86" width="150" height="368" rx="14" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-dasharray="3,5" opacity="0.9"/>
        <text x="450" y="68" text-anchor="middle" font-size="15" font-weight="800" fill="#FFFFFF" letter-spacing="1.5" font-family="-apple-system,sans-serif">단차</text>

        <!-- 창문 (왼쪽) -->
        <text x="30" y="420" text-anchor="middle" font-size="15" font-weight="800" fill="#FFFFFF" letter-spacing="1.5" font-family="-apple-system,sans-serif" transform="rotate(-90 30 420)">창문</text>

        <!-- 출입구 -->
        <text x="300" y="800" text-anchor="middle" font-size="15" font-weight="800" fill="#FFFFFF" letter-spacing="1.5" font-family="-apple-system,sans-serif">출입구</text>
        <line x1="255" y1="793" x2="345" y2="793" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>

        <!-- 테이블 A (x=150, y=100) 좌우 의자 -->
        <g id="tbl-A">
          <rect x="95" y="70" width="110" height="72" rx="16" fill="none" stroke="rgba(94,92,230,0.35)" stroke-width="8" opacity="0.4" filter="url(#glowPurpleSoft)"/>
          <rect x="100" y="70" width="100" height="60" rx="10" fill="rgba(30,28,70,0.90)" stroke="rgba(94,92,230,0.55)" stroke-width="1.5"/>
          <rect x="102" y="72" width="96" height="28" rx="8" fill="rgba(255,255,255,0.04)"/>

function updateChair(seatId, name){
  const g = document.getElementById(seatId);
  if(!g) return;
  const back = g.querySelector('.chair-back');
  const seat = g.querySelector('.chair-seat');
  const txt  = g.querySelector('.chair-name');
  const isLeader = LEADERS.includes(name);
  const taken = !!name;

  if(taken && isLeader){
    back.setAttribute('class','chair-back leader');
    seat.setAttribute('class','chair-seat leader');
    txt.setAttribute('class','chair-name');
    txt.textContent = name;
  } else if(taken){
    back.setAttribute('class','chair-back member');
    seat.setAttribute('class','chair-seat member');
    txt.setAttribute('class','chair-name member-name');
    txt.setAttribute('font-size', name.length>2 ? '7' : '8');

  } else {

    seat.setAttribute('class','chair-seat');
    txt.textContent = '';
  }
}

  document.getElementById('member-count').textContent=`${mDone}/23명 완료`;
  document.getElementById('badge-leaders').textContent=`👑 ${lDone}/${LEADERS.length}`;
  document.getElementById('badge-members').textContent=`★ ${mDone}/${MEMBERS.length}`;
  document.getElementById('announce-text').textContent=announceText;
  if(rosterOpen) renderRoster();
}

function renderRoster(){
  const lw=document.getElementById('roster-leaders'); lw.innerHTML='';
  LEADERS.forEach(name=>{
    const seat=Object.keys(assigned).find(k=>assigned[k]===name)||null;
    const d=document.createElement('div');
    d.className='name-chip leader-chip'+(seat?' taken':'');
    d.innerHTML=name+(seat?`<span class="seat-label">${seat}</span>`:'');
    lw.appendChild(d);
  });
  const mw=document.getElementById('roster-members'); mw.innerHTML='';
  MEMBERS.forEach(name=>{
    const seat=Object.keys(assigned).find(k=>assigned[k]===name)||null;
    const d=document.createElement('div');
    d.className='name-chip member-chip'+(seat?' taken':'');
    d.innerHTML=name+(seat?`<span class="seat-label">${seat}</span>`:'');
    mw.appendChild(d);
  });
}

// ── 입장 ─────────────────────────────────────────────
window.enterApp = function(r){
  role=r;
  document.getElementById('screen-entry').style.display='none';
  document.getElementById('screen-app').style.display='block';
  const bar=document.getElementById('role-bar');
  if(r==='host'){bar.className='bar-host';bar.innerHTML='<span>👑 진행자 모드</span><span class="role-badge role-host" style="margin-left:8px">모든 기능 사용 가능</span>';}
  else if(r==='viewer'){bar.className='bar-viewer';bar.innerHTML='<span>👀 참석자 모드</span><span class="role-badge role-viewer" style="margin-left:8px">명단 보기만 가능</span>';}
  else{bar.className='bar-browse';bar.innerHTML='<span>🔍 둘러보기 모드</span><span class="role-badge role-browse" style="margin-left:8px">실시간 공유 없음</span>';}

  // 헤더 타이틀 — browse만 다르게
  document.getElementById('header-title').textContent =
    r==='browse' ? '뽑기 방법을 구경해주세요' : '🌸🤤🍀 자리를 뽑아볼게요 🥵✨🥑';

  // 황금 안내 박스 — host만 항상 표시, viewer는 텍스트가 있을 때만 표시
  // (browse는 숨김)
  if(r==='browse'){
    document.getElementById('announce-box').style.display='none';
  } else {
    document.getElementById('announce-box').style.display='block';
  }

  // 버튼 권한
  document.getElementById('btn-leaders').disabled = (r==='viewer');
  document.getElementById('btn-members').disabled = (r==='viewer');
  document.getElementById('btn-reset').disabled   = (r==='viewer');

  // host 전용 버튼 표시
  document.getElementById('btn-practice').style.display = (r==='host') ? 'inline-block' : 'none';
  document.getElementById('btn-real').style.display     = (r==='host') ? 'inline-block' : 'none';

  renderAll();

  if(r==='host'||r==='viewer'){
    onValue(ref(db,DB_SEATS),snap=>{
      assigned=snap.val()??emptyAssigned();
      renderAll();
    });
    onValue(ref(db,DB_ANNOUNCE),snap=>{
      announceText=snap.val()??'';
      if(r==='viewer'){
        document.getElementById('announce-box').style.display = announceText ? 'block' : 'none';
      }
      document.getElementById('announce-text').textContent = announceText;
    });
    // viewer: 진행자의 뽑기 이벤트 감지 → 애니메이션 실행
    if(r==='viewer'){
      let lastTs=0;
      let firstLoad=true;
      onValue(ref(db,DB_EVENT),snap=>{
        const ev=snap.val();
        if(firstLoad){
          // 입장 시점에 이미 저장돼 있던 과거 이벤트는 재생하지 않음
          firstLoad=false;
          if(ev) lastTs=ev.ts;
          return;
        }
        if(!ev||ev.ts===lastTs) return; // 중복 방지
        lastTs=ev.ts;
        playAnimationForViewer(ev.resultMap, ev.isLeader);
      });
    }
  }
};

window.submitEntryPw = function(){
  const val=document.getElementById('entry-pw').value.trim();
  if(val===PW_HOST) window.enterApp('host');
  else if(val===PW_VIEWER) window.enterApp('viewer');
  else{
    document.getElementById('entry-error').style.display='block';
    document.getElementById('entry-pw').classList.add('error');
    document.getElementById('entry-pw').value='';
    setTimeout(()=>{document.getElementById('entry-error').style.display='none';document.getElementById('entry-pw').classList.remove('error');},2000);
  }
};
document.getElementById('entry-pw').addEventListener('keydown',e=>{if(e.key==='Enter')window.submitEntryPw();});

// ── 뽑기 ─────────────────────────────────────────────
window.onDrawClick = function(isLeader){
  if(phase!=='idle') return;
  doExecuteDraw(isLeader);
};

function doExecuteDraw(isLeader){
  if(phase!=='idle') return;
  phase='animating';
  document.getElementById('btn-leaders').disabled=true;
  document.getElementById('btn-members').disabled=true;
  document.getElementById('btn-reset').disabled=true;

  const list=isLeader?LEADERS:MEMBERS;
  const base={...assigned};
  Object.keys(base).forEach(k=>{if(list.includes(base[k]))base[k]=null;});

  let resultMap={};
  if(isLeader){
    const sL=shuffle(LEADERS), sT=shuffle(TABLE_IDS);
    sT.forEach((tid,i)=>{
      const seats=shuffle(TABLE_SEATS[tid]);
      resultMap[seats[0]]=sL[i];
    });
  } else {
    const empty=ALL_SEAT_IDS.filter(id=>!base[id]);
    const sS=shuffle(empty), sM=shuffle(MEMBERS);
    sM.forEach((n,idx)=>{if(idx<sS.length)resultMap[sS[idx]]=n;});
  }

  // 칩 날리기
  const btnEl=document.getElementById(isLeader?'btn-leaders':'btn-members');
  const btnR=btnEl.getBoundingClientRect();
  const ox=btnR.left+btnR.width/2-24, oy=btnR.top+btnR.height/2-12;
  const delays=Object.entries(resultMap).map(([seatId,name],i)=>{
    const chairEl=document.getElementById(seatId);
    let ex=ox,ey=oy;
    if(chairEl){
      const r2=chairEl.getBoundingClientRect();
      ex=r2.left+r2.width/2-24; ey=r2.top+r2.height/2-12;
    }
    const delay=i*(isLeader?0.045:0.028);
    launchChip(name,LEADERS.includes(name),ox,oy,ex,ey,delay);
    return delay;
  });

  const maxDelay=((delays.length>0?Math.max(...delays):0)+0.8)*1000;
  setTimeout(()=>{
    const next={...base,...resultMap};
    if(role==='host'){
      // 이벤트 먼저 저장 (viewer들이 감지해서 애니메이션 실행)
      set(ref(db,DB_EVENT),{resultMap,isLeader,ts:Date.now()});
      // 애니메이션 시간만큼 뒤에 실제 자리 반영
      setTimeout(()=>set(ref(db,DB_SEATS),next), maxDelay);
    } else {
      assigned=next; renderAll();
    }
    phase='idle';
    document.getElementById('btn-leaders').disabled=(role==='viewer');
    document.getElementById('btn-members').disabled=(role==='viewer');
    document.getElementById('btn-reset').disabled=(role==='viewer');
  }, 0);
}

function launchChip(name,isLeader,sx,sy,ex,ey,delay){
  const c=document.createElement('div');
  c.className='floating-chip '+(isLeader?'chip-leader':'chip-member');
  c.textContent=name; c.style.left=sx+'px'; c.style.top=sy+'px';
  document.body.appendChild(c);
  setTimeout(()=>{
    c.style.transition='left 0.6s cubic-bezier(0.22,1,0.36,1),top 0.6s cubic-bezier(0.22,1,0.36,1),opacity 0.15s ease 0.48s,transform 0.6s ease';
    c.style.left=ex+'px'; c.style.top=ey+'px'; c.style.opacity='0'; c.style.transform='scale(0.6)';
  },delay*1000+30);
  setTimeout(()=>c.remove(),(delay+0.8)*1000);
}

// viewer 전용 — Firebase 이벤트를 받아서 애니메이션 실행
function playAnimationForViewer(resultMap, isLeader){
  // 버튼 위치 대신 화면 중앙 상단을 출발점으로
  const ox = window.innerWidth/2 - 24;
  const oy = 120;
  Object.entries(resultMap).forEach(([seatId,name],i)=>{
    const chairEl=document.getElementById(seatId);
    let ex=ox, ey=oy;
    if(chairEl){
      const r2=chairEl.getBoundingClientRect();
      ex=r2.left+r2.width/2-24; ey=r2.top+r2.height/2-12;
    }
    const delay=i*(isLeader?0.045:0.028);
    launchChip(name,LEADERS.includes(name),ox,oy,ex,ey,delay);
  });
}

// ── 기타 ──────────────────────────────────────────────
window.onReset = function(){
  if(phase!=='idle') return;
  if(role==='host'){
    set(ref(db,DB_SEATS),null);
    // announce는 유지 (초기화해도 안내문구는 그대로)
  } else {
    assigned=emptyAssigned(); renderAll();
  }
};

window.onAnnounce = function(text){
  if(role!=='host') return;
  announceText=text;
  set(ref(db,DB_ANNOUNCE),text);
  document.getElementById('announce-text').textContent=text;
};

window.onLockClick = function(){
  if(role!=='host') return;
  showModal();
};

function showModal(){
  document.getElementById('modal-pw').value='';
  document.getElementById('modal-error').style.display='none';
  document.getElementById('modal-overlay').style.display='flex';
  setTimeout(()=>document.getElementById('modal-pw').focus(),100);
}

window.submitModalPw = function(){
  const val=document.getElementById('modal-pw').value;
  if(val===PW_HOST){
    document.getElementById('modal-overlay').style.display='none';
    document.getElementById('modal-pw').value='';
    const d=pendingDraw; pendingDraw=null; doExecuteDraw(d);
  } else {
    document.getElementById('modal-error').style.display='block';
    document.getElementById('modal-pw').classList.add('error');
    document.getElementById('modal-pw').value='';
    setTimeout(()=>{document.getElementById('modal-error').style.display='none';document.getElementById('modal-pw').classList.remove('error');},2000);
  }
};
document.getElementById('modal-pw').addEventListener('keydown',e=>{if(e.key==='Enter')window.submitModalPw();});
document.getElementById('modal-overlay').addEventListener('click',e=>{if(e.target===document.getElementById('modal-overlay'))document.getElementById('modal-overlay').style.display='none';});

window.toggleRoster = function(){
  rosterOpen=!rosterOpen;
  document.getElementById('roster-toggle').classList.toggle('open',rosterOpen);
  document.getElementById('roster-chevron').style.transform=rosterOpen?'rotate(180deg)':'none';
  const body=document.getElementById('roster-body');
  body.style.display=rosterOpen?'block':'none';
  if(rosterOpen) renderRoster();
};

window.onLockClick = function(){ /* 더 이상 사용 안 함 */ };
</script>
